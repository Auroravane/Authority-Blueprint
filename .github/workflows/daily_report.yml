name: Daily ACHILLES Report

on:
  schedule:
    - cron: '0 18 * * *'  # 3:00 AM JST (Japan Standard Time, UTC+9) — every day
  workflow_dispatch:      # Manual trigger for testing

# Prevent overlapping runs
concurrency:
  group: achilles-daily-report
  cancel-in-progress: false

# Needs write permission to commit the report back to the repo
permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 ahead of June 2026 deadline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai==1.82.0

      - name: Run ACHILLES Report Engine
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python scripts/report_engine.py

      - name: Commit report to repository
        run: |
          git config user.name "ACHILLES Bot"
          git config user.email "achilles-bot@ruflo.ai"
          git add reports/
          git diff --staged --quiet && echo "No changes to commit." || git commit -m "📊 ACHILLES Report: $(date -u +'%Y-%m-%d') [auto]"
          git push
