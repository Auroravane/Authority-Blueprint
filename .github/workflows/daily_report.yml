name: Daily ACHILLES Report

on:
  schedule:
    - cron: '0 18 * * *'  # 3:00 AM JST (Japan Standard Time, UTC+9) — every day
  workflow_dispatch:      # Manual trigger for testing

# Prevent overlapping runs (scheduled + manual, or delayed re-runs)
concurrency:
  group: achilles-daily-report
  cancel-in-progress: false

permissions:
  contents: read  # Only needs to read SystemPrompt.md from the repo

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Kill if NVIDIA API hangs; 10 min is generous

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned dependencies
        run: |
          pip install \
            openai==1.82.0 \
            google-api-python-client==2.172.0 \
            google-auth==2.40.3 \
            google-auth-httplib2==0.2.0 \
            google-auth-oauthlib==1.2.1

      - name: Run ACHILLES Report Engine
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_FOLDER_ID: ${{ secrets.GOOGLE_FOLDER_ID }}
        run: python scripts/report_engine.py
